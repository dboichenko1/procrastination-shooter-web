<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Сторож — прокрастинатор-шутер</title>
  <meta name="description" content="Стоический сторож самого себя. Поймал себя на прокрастинации — Сизиф катит твой камень в гору, пока ты не вернёшься к делу. Статистика, почасовой колокол. Работает без сети." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#F4F1EA" />

  <!-- iOS: установка на рабочий стол, полноэкранный режим -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Сторож" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png?v=2" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png?v=2" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=2" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=2" />

  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="root">
    <div id="boot" class="boot"><div class="boot-spinner"></div></div>
  </div>

  <script>
    // Регистрируем service worker — без него нет офлайна. Путь относительный,
    // поэтому scope совпадает с папкой приложения (корень или подпапка Pages).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // когда новая версия установлена и уже есть контроллер — мягко зовём перезагрузиться
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                try { window.dispatchEvent(new CustomEvent('ps-sw-update')); } catch (e) {}
              }
            });
          });
        }).catch(() => {});
      });
    }
  </script>
  <script src="app.js" defer></script>
</body>
</html>
